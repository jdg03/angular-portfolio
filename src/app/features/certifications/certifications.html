<section id="certificaciones" class="relative py-section-padding border-t border-white/5">
  <!-- Glowing background ambient light -->
  <div class="absolute bottom-1/4 right-1/4 w-80 h-80 rounded-full bg-primary/5 blur-[120px] pointer-events-none"></div>

  <div class="relative z-10 max-w-container-max mx-auto px-gutter">
    
    <!-- Section Header -->
    <header class="mb-16 text-center md:text-left">
      <div class="inline-flex items-center gap-2 mb-4 px-3 py-1 rounded-full border border-primary/20 bg-primary/5">
        <span class="w-2 h-2 rounded-full bg-primary animate-pulse shadow-[0_0_8px_#d2bbff]"></span>
        <span class="text-label-mono font-mono text-[10px] text-primary uppercase">{{ ui.certBadge[lang()] }}</span>
      </div>
      <h2 class="font-display text-4xl md:text-6xl font-bold text-white mb-4">{{ ui.certTitle[lang()] }}</h2>
      <p class="font-sans text-sm md:text-base text-on-surface-variant max-w-2xl leading-relaxed">
        {{ ui.certDesc[lang()] }}
      </p>
    </header>

    <!-- Grid Layout of Certificates -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (cert of certificationsList(); track cert.id) {
        <app-certification-card [certification]="cert" class="h-full"></app-certification-card>
      }
    </div>

  </div>
</section>
