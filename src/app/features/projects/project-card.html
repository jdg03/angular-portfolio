<app-glass-card>
  <div class="flex flex-col h-full justify-between gap-6 w-full text-left">
    <div>
      <!-- Image Recessed with Inner Shadow -->
      <div class="relative overflow-hidden rounded-2xl h-48 border border-white/5 mb-6 bg-surface-container-low group">
        <img [src]="project().image" 
             [alt]="translate(project().title)" 
             class="w-full h-full object-cover grayscale opacity-45 group-hover:grayscale-0 group-hover:opacity-85 transition-all duration-200 ease-out group-hover:scale-105" />
        <div class="absolute inset-0 shadow-[inset_0_0_20px_rgba(0,0,0,0.8)] pointer-events-none"></div>
      </div>

      <!-- Project Title -->
      <h4 class="font-display text-xl font-bold text-white mb-2 leading-tight">{{ translate(project().title) }}</h4>
      
      <!-- Project Description -->
      <p class="font-sans text-xs text-on-surface-variant leading-relaxed mb-6">{{ translate(project().description) }}</p>
    </div>

    <!-- Footer Tags and CTAs -->
    <div class="mt-auto pt-4 border-t border-white/5 flex flex-col gap-4">
      <!-- Tech Stack Used with Custom Vector Icons -->
      <div class="flex flex-wrap gap-1.5">
        @for (tech of project().technologies; track tech.name) {
          <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full border border-white/5 bg-surface-container-high/40 text-[9px] font-sans font-semibold text-primary uppercase tracking-wider">
            @if (tech.icon) {
              <app-svg-icon [name]="tech.icon" size="10" class="text-primary"></app-svg-icon>
            }
            {{ tech.name }}
          </span>
        }
      </div>

      <!-- Links buttons -->
      <div class="flex gap-4">
        @if (project().link) {
          <a [href]="project().link" target="_blank" rel="noopener noreferrer" 
             class="inline-flex items-center gap-1.5 text-xs font-mono text-primary hover:text-white transition-colors cursor-pointer">
            <app-svg-icon name="Link" size="14"></app-svg-icon>
            {{ ui.projBtnDemo[lang()] }}
          </a>
        }
      </div>
    </div>
  </div>
</app-glass-card>
