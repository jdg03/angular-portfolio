<section id="proyectos" class="relative py-section-padding border-t border-white/5">
  <!-- Glowing ambient light -->
  <div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-96 h-96 rounded-full bg-primary/10 blur-[120px] pointer-events-none"></div>

  <div class="relative z-10 max-w-container-max mx-auto px-gutter">
    
    <!-- Section Header -->
    <header class="mb-16 text-center md:text-left">
      <div class="inline-flex items-center gap-2 mb-4 px-3 py-1 rounded-full border border-primary/20 bg-primary/5">
        <span class="w-2 h-2 rounded-full bg-primary animate-pulse shadow-[0_0_8px_#d2bbff]"></span>
        <span class="font-sans font-semibold text-[9px] text-primary uppercase tracking-widest">{{ ui.projBadge[lang()] }}</span>
      </div>
      <h2 class="font-display text-4xl md:text-6xl font-bold text-white mb-4">{{ ui.projTitle[lang()] }}</h2>
      <p class="font-sans text-sm md:text-base text-on-surface-variant max-w-2xl leading-relaxed">
        {{ ui.projDesc[lang()] }}
      </p>
    </header>

    <!-- Dynamic Filter Buttons Row -->
    <div class="flex flex-wrap gap-2.5 mb-12 justify-center md:justify-start">
      @for (option of filterOptions; track option) {
        <button (click)="setFilter(option)"
                [class]="activeFilter() === option ? activeFilterClasses : inactiveFilterClasses">
          {{ option === 'ALL' ? ui.projFilterAll[lang()] : option }}
        </button>
      }
    </div>

    <!-- Projects Bento Grid (Dynamic) -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (project of filteredProjects(); track project.id) {
        <app-project-card [project]="project" class="h-full"></app-project-card>
      } @empty {
        <!-- Empty State if no projects match filter -->
        <div class="col-span-full py-16 text-center border border-white/5 bg-surface-container/20 backdrop-blur-md rounded-2xl flex flex-col items-center justify-center gap-3">
          <span class="material-symbols-outlined text-primary/60 text-4xl">search_off</span>
          <p class="text-on-surface-variant text-sm font-mono">{{ ui.projEmpty[lang()] }}</p>
        </div>
      }
    </div>

  </div>
</section>
